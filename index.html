<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="author" content="Rana Moradi">
    <title>Bear, Ninja, Hunter</title>
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>

    <h2>Bear, Ninja, Hunter</h2>

    <p>Play against the computer!</p>

    <ul>
      <li>The Bear Beats the Hunter.</li>
      <li>The Hunter beats the Ninja.</li>
      <li>And the Ninja beats the Bear.</li>
    </ul>

    <p>Click a button below to select your choice.</p>

    <hr>
    <button type="button" onclick="playGame('Bear');">Bear</button>
    <button type="button" onclick="playGame('Ninja');">Ninja</button>
    <button type="button" onclick="playGame('Hunter');">Hunter</button>
    <hr>

    <div id="results-box">
      <p id="player-choice-display"></p>
      <p id="computer-choice-display"></p>
      <p id="outcome-display"></p>
    </div>

    <div id="win-counter">
      <p id="wins-display"></p>
    </div>

    <hr id="play-again-hr-top">
    <button type="button" id="play-again-btn" onclick="playAgain();">Play Again?</button>
    <hr id="play-again-hr-bottom">

    <script src="js/script.js"></script>

  </body>
</html>
